# Dev on WSL2, deploy unchanged to an always-on host (e.g. Oracle Always-Free ARM VM).
services:
  sportsup:
    build: .
    image: sportsup:0.1.0
    container_name: sportsup
    env_file:
      - .env
    volumes:
      # Live-mount config so edits don't require a rebuild.
      - ./config.yaml:/app/config.yaml:ro
      # Persist state + logs across restarts/redeploys.
      - ./data:/app/data
      - ./logs:/app/logs
    # Always-on runtime. dry_run defaults true, so it won't send until you opt in
    # (set SPORTSUP_DRY_RUN=false in .env / delivery.dry_run: false in config.yaml).
    command: ["run"]
    restart: unless-stopped

# Dev on WSL2, deploy unchanged to an always-on host (e.g. Oracle Always-Free ARM VM).
services:
  sportsup:
    build: .
    image: sportsup:0.1.0
    container_name: sportsup
    env_file:
      - .env
    volumes:
      # Live-mount config so edits don't require a rebuild.
      - ./config.yaml:/app/config.yaml:ro
      # Persist state + logs across restarts/redeploys.
      - ./data:/app/data
      - ./logs:/app/logs
    # Always-on runtime. dry_run defaults true, so it won't send until you opt in
    # (set SPORTSUP_DRY_RUN=false in .env / delivery.dry_run: false in config.yaml).
    command: ["run"]
    restart: unless-stopped

  # Read-only admin dashboard. Bound to localhost only — reach it from your laptop with
  #   ssh -L 8080:127.0.0.1:8080 <user>@<vm-ip>
  # then open http://localhost:8080. Needs DASHBOARD_PASSWORD in .env. Optional service:
  #   docker compose up -d dashboard
  dashboard:
    build: .
    image: sportsup:0.1.0
    container_name: sportsup-dashboard
    env_file:
      - .env
    volumes:
      # OS-writable (SQLite WAL needs -wal/-shm), but the app only ever reads.
      - ./data:/app/data
    command: ["dashboard", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "127.0.0.1:8080:8080"   # published only on the host's loopback
    restart: unless-stopped
